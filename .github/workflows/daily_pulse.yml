name: Daily Pulse

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  keep-active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update timestamp
        run: |
          echo "Last pulse: $(date -u)" >> .github/last_pulse.txt
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/last_pulse.txt
          git commit -m "chore: daily pulse update" || echo "No changes to commit"
          git push